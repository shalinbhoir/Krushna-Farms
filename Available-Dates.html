<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krushna Farms - Available Dates</title>
</head>

<body>

<h2>Select Booking</h2>

<select id="date-select">
<option value="">-- Select Date --</option>
<option data-slot="Weekday" value="4/5 Jun - 6pm to 5pm">4/5 Jun</option>
<option data-slot="SatSun" value="6/7 Jun - 6pm to 5pm">6/7 Jun</option>
</select>

<br><br>

<select id="person-select">
<option value="">-- Select Person --</option>
<option value="12">12 Persons</option>
<option value="15">15 Persons</option>
<option value="18">18 Persons</option>
<option value="20">20 Persons</option>
<option value="More">More than 20</option>
</select>

<!-- INPUT FOR MORE THAN 20 -->
<div id="extra-person-box" style="display:none; margin-top:10px;">
<input type="number" id="extra-person-input" placeholder="Enter persons (21+)" min="21">
</div>

<br>

<p id="price-display" style="font-weight:bold; color:green;"></p>

<br>

<button onclick="sendToWhatsApp()">Send to WhatsApp</button>

<script>

function formatINR(amount){
  return "₹ " + amount.toLocaleString("en-IN");
}

function getPersons(){
  const selectedPerson = document.getElementById('person-select').value;

  if(selectedPerson === "More"){
    const input = document.getElementById('extra-person-input').value;
    const num = parseInt(input);

    if(!num || num <= 20){
      return null;
    }
    return num;
  }

  return parseInt(selectedPerson);
}

function calculatePrice(slot, persons){

  let price = 0;

  if(slot === "Day" || slot === "Night"){
    if(persons <= 12) price = 4500;
    else if(persons <= 15) price = 5000;
    else if(persons <= 18) price = 6000;
    else if(persons <= 20) price = 6500;
    else price = 6500 + (persons - 20) * 500;
  }

  else if(slot === "SatSun"){
    if(persons <= 15) price = 11000;
    else if(persons <= 18) price = 12000;
    else if(persons <= 20) price = 13000;
    else price = 13000 + (persons - 20) * 600;
  }

  else if(slot === "Weekday"){
    if(persons <= 12) price = 7000;
    else if(persons <= 15) price = 8000;
    else if(persons <= 18) price = 9000;
    else if(persons <= 20) price = 10000;
    else price = persons * 500;
  }

  return price;
}

function updatePrice(){

  const dateSelect = document.getElementById('date-select');
  const selectedOption = dateSelect.options[dateSelect.selectedIndex];
  const slot = selectedOption.dataset.slot;

  const persons = getPersons();

  if(!selectedOption.value){
    document.getElementById('price-display').innerText = "";
    return;
  }

  if(persons === null){
    document.getElementById('price-display').innerText = "Enter valid persons (>20)";
    return;
  }

  if(!persons){
    document.getElementById('price-display').innerText = "";
    return;
  }

  const price = calculatePrice(slot, persons);

  document.getElementById('price-display').innerText =
    "Estimated Price: " + formatINR(price);
}

function sendToWhatsApp(){

  const date = document.getElementById('date-select').value;
  const persons = getPersons();

  if(!date){
    alert("Select date");
    return;
  }

  if(!persons){
    alert("Select valid persons");
    return;
  }

  const slot = document.getElementById('date-select')
    .options[document.getElementById('date-select').selectedIndex].dataset.slot;

  const price = calculatePrice(slot, persons);

  const message = encodeURIComponent(
    "Booking Request\nDate: " + date +
    "\nPersons: " + persons +
    "\nRate: " + formatINR(price)
  );

  window.open("https://wa.me/918237245909?text=" + message);
}

document.addEventListener("DOMContentLoaded", function(){

  document.getElementById('person-select').addEventListener('change', function(){

    const box = document.getElementById('extra-person-box');

    if(this.value === "More"){
      box.style.display = "block";
    } else {
      box.style.display = "none";
      document.getElementById('extra-person-input').value = "";
    }

    updatePrice();
  });

  document.getElementById('date-select').addEventListener('change', updatePrice);
  document.getElementById('extra-person-input').addEventListener('input', updatePrice);

});

</script>

</body>
</html>
